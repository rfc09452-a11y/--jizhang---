<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>记账</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f2f4f8;--card:#fff;--text:#1e1e2e;--t2:#5f6368;--t3:#9aa0a6;--bd:#e2e6ec;--p:#4f6ef7;--pb:#edf0ff;--g:#22c55e;--r:#ef4444}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:24px}
.app{max-width:860px;margin:0 auto}.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hdr h1{font-size:22px;font-weight:700;color:var(--p)}.cd{background:var(--card);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.st{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}.st::before{content:"";width:4px;height:16px;background:var(--p);border-radius:2px}
.rw{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
.gr{display:flex;flex-direction:column;gap:4px}.gr label{font-size:11px;font-weight:600;color:var(--t2)}
.in{height:36px;border:1.5px solid var(--bd);border-radius:8px;padding:0 10px;font-size:13px;outline:none;background:#fafbfc}
.in:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(79,110,247,.12)}
.ps,.rp{display:flex;gap:4px;flex-wrap:wrap}
.ps button,.rp button{height:28px;padding:0 10px;border:1.5px solid var(--bd);border-radius:6px;background:#fafbfc;font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .12s}
.ps button:hover,.rp button:hover{border-color:var(--p);color:var(--p);background:var(--pb)}
.ps button.active,.rp button.active{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 2px 6px rgba(79,110,247,.25)}
.rp button{height:30px;padding:0 8px;font-size:10px;line-height:1.1}.rp button .s{display:block;font-size:8px;opacity:.7}.rp button.active .s{opacity:.9}
.pv{font-size:13px;color:var(--t2);display:flex;gap:12px;align-items:center;white-space:nowrap;background:var(--pb);border-radius:8px;height:36px;padding:0 12px}
.pv .f{color:var(--r);font-weight:600}.pv .p{color:var(--g);font-weight:600}
.btn{height:36px;padding:0 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:#3b5de7}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:#16a34a}
.btn-o{background:#fafbfc;color:var(--t2);border:1.5px solid var(--bd)}.btn-o:hover{border-color:var(--p);color:var(--p);background:var(--pb)}
.btn-d{background:none;color:var(--r);border:none;padding:0 6px;font-size:13px;cursor:pointer;opacity:.7}.btn-d:hover{opacity:1}
.btn-sm{height:30px;padding:0 10px;font-size:11px;font-weight:500;border:1.5px solid var(--bd);border-radius:6px;background:#fafbfc;color:var(--t2);cursor:pointer}
.btn-sm:hover{border-color:var(--p);color:var(--p);background:var(--pb)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px;font-weight:600;color:var(--t2);border-bottom:2px solid var(--bd);font-size:11px;background:#fafbfc}
td{padding:10px;border-bottom:1px solid #eee}.ar{text-align:right}.ac{text-align:center}
.tf td{font-weight:700;border-top:2px solid var(--bd);background:#f0f3ff;padding:12px 10px}
.pr{color:var(--g);font-weight:600}.co{color:var(--r);font-weight:600}
.emp{padding:48px 0;color:var(--t3);font-size:13px;text-align:center}
.act{display:flex;gap:8px;margin-top:10px}
.bd{font-size:11px;color:var(--t2);background:#f1f3f4;padding:2px 10px;border-radius:20px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-inner{background:var(--card);border-radius:14px;max-width:500px;width:90vw;max-height:85vh;display:flex;flex-direction:column;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.modal-hdr h2{font-size:15px;font-weight:700;margin:0}
</style>
</head>
<body>
<div class="app">
<div class="hdr"><h1>记账</h1><span class="bd" id="cnt2">0 条</span></div>

<div class="cd"><div class="st">添加记录</div>
<div class="rw">
<div class="gr"><label>时间</label><input type="time" id="t" class="in" step="60" style="width:100px"></div>
<div class="gr" style="flex:1;min-width:240px">
<label>花费</label>
<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
<div class="ps" id="cp"><button data-v="50">50</button><button data-v="100">100</button><button data-v="200">200</button><button data-v="348">348</button><button data-v="648">648</button><button data-v="1000">1000</button></div>
<input type="number" id="c" class="in" placeholder="自定义" step="0.01" min="0" style="width:80px"></div></div>
<div class="gr"><label>收入</label><input type="number" id="i" class="in" placeholder="0.00" step="0.01" min="0" style="width:100px"></div></div>

<div class="rw">
<div class="gr" style="flex:1;min-width:240px">
<label>成本费率 <button class="btn-sm" id="mgrBtn" style="font-size:10px;padding:0 6px;height:22px">管理</button></label>
<div style="display:flex;gap:6px;align-items:flex-start;flex-wrap:wrap"><div class="rp" id="rp"></div></div></div>
<div class="gr"><label>收续费</label><div class="ps" id="fpreset"><button data-v="0" class="active">0</button><button data-v="0.006">0.6%</button><button data-v="0.016">1.6%</button></div></div>
<div class="gr"><label>返利</label>
<div class="ps" id="flPreset">
<button data-v="0" class="active">0</button><button data-v="0.005">0.5%</button><button data-v="0.01">1%</button><button data-v="0.016">1.6%</button><button data-v="0.02">2%</button>
<button data-v="0.032">3.2%</button><button data-v="0.036">3.6%</button><button data-v="0.038">3.8%</button>
<input type="number" id="flCustom" placeholder="自定义%" step="0.1" min="0" max="100" style="width:64px;height:28px;border:1.5px solid var(--bd);border-radius:6px;padding:0 6px;font-size:11px;outline:none;background:#fafbfc">
</div></div>
<div class="gr"><label>返利基数</label>
<div class="ps" id="flBasePreset">
<button data-v="50">50</button><button data-v="100">100</button><button data-v="198">198</button><button data-v="348">348</button><button data-v="648">648</button><button data-v="988">988</button>
<input type="number" id="flBase" placeholder="自填" step="1" min="0" style="width:64px;height:28px;border:1.5px solid var(--bd);border-radius:6px;padding:0 6px;font-size:11px;outline:none;background:#fafbfc">
</div></div>
<div class="gr" style="flex:1;min-width:320px">
<label>返利备注 <span style="font-size:10px;color:var(--t3);font-weight:400">(勾选后计入导出)</span></label>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<div style="flex:1;min-width:180px;border:1.5px solid var(--bd);border-radius:8px;padding:8px;background:#fafbfc">
<label style="font-size:11px;font-weight:600;color:var(--p);display:flex;align-items:center;gap:4px"><input type="checkbox" id="flGL" checked style="width:14px;height:14px">公链</label>
<input type="text" id="flLinkGL" class="in" placeholder="公链备注" list="flListGL" style="width:100%;height:32px;font-size:11px;margin-top:4px">
<datalist id="flListGL"></datalist>
<div style="display:flex;gap:4px;margin-top:4px"><button id="flSaveGL" class="btn-sm" style="font-size:9px;padding:0 6px;height:24px">保存</button><button id="flDelGL" class="btn-sm" style="font-size:9px;padding:0 6px;height:24px">删除</button></div>
</div>
<div style="flex:1;min-width:180px;border:1.5px solid var(--bd);border-radius:8px;padding:8px;background:#fafbfc">
<label style="font-size:11px;font-weight:600;color:#2563eb;display:flex;align-items:center;gap:4px"><input type="checkbox" id="flHD" style="width:14px;height:14px">蝴蝶</label>
<input type="text" id="flLinkHD" class="in" placeholder="蝴蝶备注" list="flListHD" style="width:100%;height:32px;font-size:11px;margin-top:4px">
<datalist id="flListHD"></datalist>
<div style="display:flex;gap:4px;margin-top:4px"><button id="flSaveHD" class="btn-sm" style="font-size:9px;padding:0 6px;height:24px">保存</button><button id="flDelHD" class="btn-sm" style="font-size:9px;padding:0 6px;height:24px">删除</button></div>
</div>
</div></div>
<div class="gr" style="align-self:flex-end"><div class="pv">成本+手续费 <span class="f" id="pf">0.00</span> | 利润 <span class="p" id="pp">0.00</span></div></div>
<div class="gr" style="align-self:flex-end"><button class="btn btn-p" id="addBtn">+ 添加</button></div></div></div>

<div class="cd">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="st" style="margin-bottom:0">记录列表</div><span class="bd" id="cnt">0 条</span></div>
<table><thead><tr><th style="width:36px" class="ac">#</th><th style="width:56px" class="ac">时间</th><th class="ar">花费</th><th class="ac">费率</th><th class="ar">收入</th><th class="ar">利润</th><th style="width:36px"></th></tr></thead>
<tbody id="tb"><tr><td colspan="7" class="emp">暂无记录，请添加记录</td></tr></tbody><tfoot id="tf"></tfoot></table>

<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px;padding:8px 10px;background:#f8f9ff;border-radius:8px;border:1px solid #e8eaed">
<div class="ps" id="dayFilter"><button data-d="today" class="active">今天</button><button data-d="yesterday">昨天</button><button data-d="-2">前天</button><button data-d="custom">自选</button></div>
<input type="number" id="dayCustom" placeholder="天" step="1" min="1" max="365" style="width:60px;height:28px;border:1.5px solid var(--bd);border-radius:6px;padding:0 6px;font-size:11px;outline:none;background:#fafbfc">
<span style="font-size:11px;color:var(--t3)" id="dayCount"></span></div>

<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px;padding:8px 10px;background:#fff8e6;border-radius:8px;border:1px solid #e8eaed;font-size:11px">
<span>记录保留</span>
<input type="number" id="keepDays" value="7" min="1" max="365" style="width:46px;height:24px;border:1px solid var(--bd);border-radius:4px;padding:0 4px;font-size:11px;text-align:center;outline:none">
<span>天</span>
<button class="btn btn-o" id="delOldBtn" style="height:24px;font-size:9px;padding:0 6px">删除过期</button>
<span style="color:var(--t3);font-size:10px" id="keepStatus"></span></div>

<div class="act">
<button class="btn btn-g" id="expDOC">导出 Word</button>
<button class="btn btn-o" id="expXLS">导出 Excel</button>
<button class="btn btn-o" id="expJSON">导出 JSON</button>
<button class="btn btn-o" id="cpSumBtn">复制返利汇总</button>
<button class="btn btn-o" id="impBtn">导入数据</button>
<input type="file" id="impFile" accept=".json,.xlsx,.xls" style="display:none">
<button class="btn btn-o" id="clr">清空</button></div></div></div>

<div class="modal" id="rateModal"><div class="modal-inner">
<div class="modal-hdr"><h2>管理费率</h2><button class="btn btn-o" id="closeMgr" style="height:30px;font-size:11px">关闭</button></div>

<div style="display:flex;gap:6px;align-items:center;padding:6px 8px;background:#e8f0fe;border-radius:6px;margin-bottom:8px;font-size:11px">
<span>时间费率快照</span>
<input type="text" id="timeSnapInput" placeholder="粘贴时间费率消息" style="flex:1;height:24px;border:1px solid var(--bd);border-radius:4px;padding:0 6px;font-size:10px;outline:none">
<button class="btn btn-o" id="saveTimeSnapBtn" style="height:24px;font-size:9px;padding:0 6px">保存快照</button>
</div>
<div style="font-size:10px;color:var(--t3);padding:0 8px;margin-bottom:4px" id="timeSnapStatus"></div>
<div id="timeSnapList" style="max-height:80px;overflow-y:auto;margin-bottom:8px;padding:0 8px;font-size:11px"></div>

<div style="display:flex;gap:8px">
<textarea id="rateInput" style="flex:1;min-height:100px;border:1.5px solid var(--bd);border-radius:6px;padding:8px;font-size:11px;font-family:inherit;resize:vertical;outline:none;background:#fafbfc" placeholder="名称:0.xxx 每行一条"></textarea>
<div style="display:flex;flex-direction:column;gap:4px;width:80px">
<button class="btn btn-o" id="importBtn" style="height:28px;font-size:10px;padding:0">粘贴</button>
<button class="btn btn-p" id="identifyBtn" style="height:28px;font-size:10px;padding:0">识别更新</button>
<button class="btn btn-o" id="resetRates" style="height:28px;font-size:10px;padding:0">恢复默认</button>
<button class="btn btn-p" id="saveRates" style="height:28px;font-size:10px;padding:0">保存</button></div></div>
<div style="font-size:11px;color:var(--t2);background:#fafbfc;border:1px solid var(--bd);border-radius:6px;padding:8px;max-height:150px;overflow-y:auto;margin-top:6px" id="ratePreview">加载中...</div>
<span id="rateCount" style="font-size:10px;color:var(--t3)"></span></div></div>

<script>
(function(){
var _g=document.getElementById.bind(document);document.getElementById=function(id){var e=_g(id);return e||{onclick:function(){},oninput:function(){},onchange:function(){},style:{},value:"",innerHTML:"",focus:function(){},querySelector:function(){return null},querySelectorAll:function(){return{forEach:function(){}}},getAttribute:function(){return""},classList:{add:function(){},remove:function(){}},closest:function(){return null}}};var K="ld10",RK="rdb10";
var entries=JSON.parse(localStorage.getItem(K)||"[]");
var sr="0.875",sl="普通",fr="0",flr="0",flb="0",keepKey="ldKeep";

var defRates=[{g:"默认",items:[["普通","0.875"],["加速","0.88"],["超速","0.885"],["极速","0.89"],["火箭","0.895"],["秒拉","0.9"],["超快","0.91"],["直拉","0.91"],["怪额","0.95"]]},
  {g:"小刀",items:[["微信","0.89"],["微100","0.87"],["小额10起","0.84"]]},
  {g:"梦想",items:[["微信","0.89"],["小额","0.84"]]},
  {g:"星悦微信",items:[["单端(100起qb)","0.915"],["通额","0.88"],["速额","0.89"],["固额(30/50/100)","0.865"],["小额(30起)","0.84"],["点额(10起)","0.82"],["扫码通额(100起qb)","0.895"],["扫码固额(50起qb)","0.87"],["扫码小额(10起qb)","0.85"]]},
  {g:"小刀2",items:[["小刀微信100","0.885"],["小刀微信100起","0.87"],["小刀微信200","0.89"],["小刀微信50","0.86"],["小刀微信10起","0.84"],["微信通额","0.875"],["微信速额","0.89"]]}];

function ldR(){var d=localStorage.getItem(RK);if(d)try{return JSON.parse(d)}catch(e){}return JSON.parse(JSON.stringify(defRates))}
function svR(d){localStorage.setItem(RK,JSON.stringify(d))}

var tsKey="ldTs";function ldTS(){var d=localStorage.getItem(tsKey);return d?JSON.parse(d):[]}function svTS(a){localStorage.setItem(tsKey,JSON.stringify(a))}
function parseTimeRates(txt){var lines=txt.split("\n");if(!lines.length)return null;var first=lines[0].trim();var timeMatch=first.match(/(\d{1,2})[:.](\d{2})/);if(!timeMatch)return null;var time=String(timeMatch[1]).padStart(2,"0")+":"+timeMatch[2];var groups=[{g:"",items:[]}];for(var i=1;i<lines.length;i++){var line=lines[i].trim();if(!line)continue;var colonIdx=line.indexOf("：");if(colonIdx<0)colonIdx=line.indexOf(":");if(colonIdx>=0){var name=line.substring(0,colonIdx).trim();var rate=line.substring(colonIdx+1).trim();rate=rate.replace(/[%％]/g,"").replace(/@所有人/g,"").replace(/通用/g,"");var r=parseFloat(rate);if(isNaN(r)){var numMatch=rate.match(/(\d{2,4})$/);if(numMatch){var num=numMatch[1];r=parseFloat(num);name=rate.replace(num,"").trim()||name}}if(!isNaN(r)){if(r>=80&&r<=99){r=r/100}else if(r>=800&&r<=999){r=r/1000}else if(r>=8000&&r<=9999){r=r/10000}groups[groups.length-1].items.push([name,String(r)])}}else{var numMatch=line.match(/(\d{2,4})$/);if(numMatch){var num=numMatch[1];var r=parseFloat(num);if(!isNaN(r)){var name=line.replace(num,"").trim();if(name.length>0||r>=80){if(r>=80&&r<=99){r=r/100}else if(r>=800&&r<=999){r=r/1000}else if(r>=8000&&r<=9999){r=r/10000}groups[groups.length-1].items.push([name||"",String(r)])}}continue}groups.push({g:line,items:[]})}}var hasRates=false;for(var g=0;g<groups.length;g++){if(groups[g].items.length>0){hasRates=true;break}}if(!hasRates)return null;if(groups[0].g===""&&groups[0].items.length===0){groups.shift()}return{time:time,groups:groups}}
function saveTimeSnap(){var txt=document.getElementById("timeSnapInput").value;if(!txt.trim()){alert("请粘贴时间费率消息");return}var snap=parseTimeRates(txt);if(!snap){alert("未识别到时间和费率");return}var all=ldTS();var exists=false;for(var i=0;i<all.length;i++){if(all[i].time===snap.time){all[i]=snap;exists=true;break}}if(!exists)all.push(snap);all.sort(function(a,b){return a.time.localeCompare(b.time)});svTS(all);document.getElementById("timeSnapInput").value="";renderTimeSnapList();document.getElementById("timeSnapStatus").textContent="已保存 "+snap.time+" 的费率快照"}
function renderTimeSnapList(){var all=ldTS(),list=document.getElementById("timeSnapList");if(!all.length){list.innerHTML='<div style="color:var(--t3)">暂无快照</div>';return}var h="";for(var i=0;i<all.length;i++){var cnt=0;if(all[i].groups){for(var g=0;g<all[i].groups.length;g++)cnt+=all[i].groups[g].items.length}else if(all[i].rates){cnt=all[i].rates.length}h+='<div style="display:flex;gap:8px;align-items:center;padding:2px 0;border-bottom:1px solid #eee;cursor:pointer" onclick="applyTimeSnap(\''+all[i].time+'\')"><span style="color:var(--p);font-weight:600">'+all[i].time+'</span><span style="color:var(--t3);font-size:10px">'+cnt+'条</span><button class="btn-d" style="font-size:10px" onclick="event.stopPropagation();delTimeSnap(\''+all[i].time+'\')">&times;</button></div>'}list.innerHTML=h}
function applyTimeSnap(time){var all=ldTS();for(var i=0;i<all.length;i++){if(all[i].time===time){var snap=all[i];var newRates=[];if(snap.groups){newRates=snap.groups}else if(snap.rates){newRates=[{g:snap.time,items:snap.rates.map(function(r){return[r[0],String(r[1])]})}]}if(!newRates.length){newRates=[{g:snap.time,items:(snap.rates||[]).map(function(r){return[r[0],String(r[1])]})}]}svR(newRates);bRP();document.getElementById("rateModal").style.display="none";document.getElementById("t").value=time;return}}alert("未找到该时间的快照")}
function delTimeSnap(time){if(!confirm("确定删除该快照？"))return;var all=ldTS();all=all.filter(function(s){return s.time!==time});svTS(all);renderTimeSnapList()}

function bRP(){
  var data=ldR(),rp=document.getElementById("rp"),h="";
  for(var g=0;g<data.length;g++){
    if(data[g].g&&data[g].g!="默认")h+='<div style="width:100%;font-size:9px;font-weight:600;color:var(--t3);margin:3px 0 1px;padding:0 2px;letter-spacing:.5px">'+data[g].g+'</div>';
    for(var j=0;j<data[g].items.length;j++){
      var n=data[g].items[j][0],v=data[g].items[j][1],a=(v===sr&&n===sl)?" active":"";
      h+='<button data-r="'+v+'" class="'+a+'"><span>'+n+'</span><span class="s">'+v+'</span></button>';
    }
  }
  rp.innerHTML=h;
  rp.onclick=function(e){var b=e.target.closest("button");if(!b)return;sr=b.getAttribute("data-r");sl=b.querySelector("span").textContent;this.querySelectorAll("button").forEach(function(x){x.classList.remove("active")});b.classList.add("active");up()};
}

function parseTxt(txt){
  var gs=[{g:"",items:[]}],lines=txt.split("\n");
  for(var k=0;k<lines.length;k++){
    var line=lines[k].trim();if(!line)continue;
    var idx=line.indexOf("：");if(idx<0)idx=line.indexOf(":");
    if(idx<0){var last=gs[gs.length-1];if(last.g===""&&last.items.length===0)last.g=line;else gs.push({g:line,items:[]});continue}
    var name=line.substring(0,idx).trim(),val=line.substring(idx+1).trim().replace(/[%％]/g,""),r=parseFloat(val);

document.getElementById("impFile").onchange=function(e){var file=e.target.files[0];if(!file)return;var fn=file.name.toLowerCase();if(fn.endsWith(".json")){var reader=new FileReader();reader.onload=function(ev){try{var data=JSON.parse(ev.target.result);var arr=data.entries||(Array.isArray(data)?data:[data]);if(!arr.length){alert("未识别到有效数据");return}var mode=confirm("确定导入？\n\n点确定=追加到现有数据\n点取消=替换全部数据");if(mode){entries=entries.concat(arr)}else{entries=arr}sv();rd();alert("导入 "+arr.length+" 条记录");document.getElementById("impFile").value=""}catch(ex){alert("文件格式错误："+ex.message)}};reader.readAsText(file)}else if(fn.endsWith(".xlsx")||fn.endsWith(".xls")){var reader=new FileReader();reader.onload=function(ev){try{var wb=XLSX.read(ev.target.result,{type:"array"});var ws=wb.Sheets[wb.SheetNames[0]];var raw=XLSX.utils.sheet_to_json(ws);if(!raw.length){alert("Excel中没有数据");return}var arr=[];for(var i=0;i<raw.length;i++){var row=raw[i],e={};for(var k in row){if(k==="序号"||k==="#")continue;if(k==="时间"||k==="t")e.t=String(row[k]);else if(k==="花费"||k==="c")e.c=parseFloat(String(row[k]))||0;else if(k==="费率"||k==="r")e.r=parseFloat(String(row[k]))||0;else if(k==="收入"||k==="i")e.i=parseFloat(String(row[k]))||0;else if(k==="手续费"||k==="fr")e.fr=parseFloat(String(row[k]))||0;else if(k==="返利金额"||k==="fl"){}else if(k==="备注"||k==="fll")e.fll=String(row[k]);else if(k==="返利基数"||k==="flb")e.flb=parseFloat(String(row[k]))||0;else if(k==="返利率"||k==="flr")e.flr=parseFloat(String(row[k]))||0;else if(k==="费率名称"||k==="l")e.l=String(row[k])}e.ca=e.ca||new Date().toISOString();arr.push(e)}var mode=confirm("确定导入？\n\n点确定=追加到现有数据\n点取消=替换全部数据");if(mode){entries=entries.concat(arr)}else{entries=arr}sv();rd();alert("导入 "+arr.length+" 条记录");document.getElementById("impFile").value=""}catch(ex){alert("Excel解析失败："+ex.message)}};reader.readAsArrayBuffer(file)}};

document.getElementById("clr").onclick=function(){if(!entries.length)return;var r=prompt("清空选项：\n输入天数(如3=清理3天前的数据)\n输入0或all=全清\n当前共"+entries.length+"条","3");if(r===null)return;var rr=r.trim();if(rr==="0"||rr.toLowerCase()==="all"){if(confirm("确定全清？")){entries=[];sv();rd()}return}var d=parseInt(rr);if(isNaN(d)||d<1){alert("请输入有效天数");return}var now=new Date(),cut=new Date(now);cut.setDate(cut.getDate()-d);var b=entries.length;entries=entries.filter(function(e){var ca=e.ca||"";if(!ca)return false;return new Date(ca)>=cut});if(entries.length<b){sv();rd();alert("已删除 "+(b-entries.length)+" 条，保留 "+entries.length+" 条")}else alert("没有超过 "+d+" 天的数据")};
